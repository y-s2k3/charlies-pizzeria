<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Charlie's Pizzeria</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .order-customer {
            background: #f8f9fa;
            padding: 0.8rem;
            border-radius: 8px;
            margin: 0.5rem 0;
            font-size: 0.9rem;
        }
        
        .order-customer p {
            margin: 0.3rem 0;
        }
        
        .order-customer i {
            width: 25px;
            color: #E63946;
        }
        
        .order-items {
            margin: 0.5rem 0;
            padding: 0.5rem 0;
            color: #555;
            font-size: 0.9rem;
            border-top: 1px dashed #eee;
            border-bottom: 1px dashed #eee;
        }
        
        .status-ordered {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
        }
        
        .status-preparing {
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
        }
        
        .status-baking {
            background: linear-gradient(135deg, #e17055, #d63031);
        }
        
        .status-delivering {
            background: linear-gradient(135deg, #00b894, #55efc4);
        }
        
        .status-delivered {
            background: linear-gradient(135deg, #0984e3, #74b9ff);
        }
        
        .action-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        
        .action-btn {
            background: white;
            border: 2px solid #E63946;
            color: #E63946;
            padding: 1.5rem;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .action-btn:hover {
            background: linear-gradient(135deg, #E63946, #C1121F);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(230, 57, 70, 0.3);
        }
        
        .action-btn i {
            font-size: 2rem;
        }
    </style>
</head>
<body>
    <div class="admin-page">
        <aside class="admin-sidebar">
            <div class="sidebar-header">
                <h2>🍕 Charlie's Pizzeria</h2>
                <p>Admin Panel Manager</p>
            </div>
            
            <nav class="admin-nav">
                <a href="admin.html" class="active">
                    <i class="fas fa-tachometer-alt"></i> Dashboard
                </a>
                <a href="#" id="navReports">
                    <i class="fas fa-clipboard-list"></i> Reports
                </a>
                <a href="#" id="navMenu">
                    <i class="fas fa-pizza-slice"></i> Menu
                </a>
                <a href="#" id="navUsers">
                    <i class="fas fa-users"></i> Users
                </a>
                <a href="orders.html" id="myOrdersLink">
                    <i class="fas fa-history"></i> My Orders
                </a>
                <a href="index.html">
                    <i class="fas fa-store"></i> View Store
                </a>
                <a href="#" id="adminLogout" class="logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </nav>
        </aside>
        
        <main class="admin-content">
            <header class="admin-header">
                <h1>Admin Dashboard</h1>
                <div class="admin-stats">
                    <div class="stat-card">
                        <h3>Today's Orders</h3>
                        <p class="stat-number" id="todayOrdersCount">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Revenue Today</h3>
                        <p class="stat-number" id="todayRevenue">£0</p>
                    </div>
                    <div class="stat-card">
                        <h3>Total Customers</h3>
                        <p class="stat-number" id="totalCustomers">0</p>
                    </div>
                    <div class="stat-card">
                        <h3>All Time Revenue</h3>
                        <p class="stat-number" id="totalRevenue">£0</p>
                    </div>
                </div>
            </header>
            
            <section class="active-orders">
                <h2>ACTIVE ORDERS</h2>
                <div id="ordersContainer">
                    <p style="text-align: center; padding: 2rem; color: #666;">Loading orders...</p>
                </div>
            </section>
            
            <section class="quick-actions">
                <h2>Quick Actions</h2>
                <div class="action-grid">
                    <button class="action-btn" id="reportsBtn">
                        <i class="fas fa-chart-line"></i>
                        View Reports
                    </button>
                    <button class="action-btn" id="manageStaffBtn">
                        <i class="fas fa-users"></i>
                        View Staff & Users
                    </button>
                    <button class="action-btn" id="viewAnalyticsBtn">
                        <i class="fas fa-chart-simple"></i>
                        View Analytics
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script src="./js/app.js"></script>
    <script src="./js/admin.js"></script>
</body>
</html>
