<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Charlie's Pizzeria</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-page {
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('images/pizzabackgroundregister.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 2.5rem;
            max-width: 450px;
            width: 90%;
            margin: 2rem auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .login-card h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #E63946;
            font-size: 2rem;
        }
        
        .login-card > p {
            text-align: center;
            margin-bottom: 2rem;
            color: #6C757D;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2D3436;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #E63946;
            box-shadow: 0 0 0 3px rgba(230, 57, 70, 0.1);
        }
        
        .btn-register {
            width: 100%;
            padding: 0.9rem;
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }
        
        .login-footer {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .login-footer a {
            color: #E63946;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .login-footer a:hover {
            color: #C1121F;
            text-decoration: underline;
        }
        
        .form-message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
        }
        
        .form-message.error {
            background: #ffe0e0;
            color: #d32f2f;
            border: 1px solid #d32f2f;
        }
        
        .form-message.success {
            background: #e0ffe0;
            color: #2e7d32;
            border: 1px solid #2e7d32;
        }
        
        footer {
            background: #2D3436;
            color: white;
            text-align: center;
            padding: 2rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🍕 Charlie's Pizzeria</h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a>
                <a href="orders.html" id="myOrdersLink" style="display: none;">My Orders</a>
                <a href="tracking.html">Track Order</a>
                <a href="admin.html" id="adminLink" style="display: none; color: #E63946; font-weight: bold;">
                    <i class="fas fa-crown"></i> Admin Panel
                </a>
                <a href="login.html" id="loginLink">Login</a>
                <a href="register.html" class="active" id="registerLink">Register</a>
                <a href="#" id="logoutBtn" style="color: #FF4757; display: none;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
                <span id="pointsDisplay" style="display: none; background: linear-gradient(135deg, #FFD166, #FFA726); padding: 0.3rem 0.8rem; border-radius: 20px; color: white; font-weight: bold; margin-left: 10px;">
                    <i class="fas fa-star"></i> <span id="pointsValue">0</span> pts
                </span>
            </div>
        </div>
    </nav>

    <div class="login-page">
        <div class="login-card">
            <h1>Create Account</h1>
            <p>Join Charlie's Pizzeria today!</p>
            
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create a password (min 3 characters)" required>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
                
                <button type="submit" class="btn-primary btn-register">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </form>
            
            <div class="login-footer">
                <a href="index.html">← Back to Home</a>
                <a href="login.html">Already have an account? Login →</a>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 Charlie's Pizzeria | Final Year Project</p>
            <p style="font-size: 0.8rem; margin-top: 0.5rem;">Supervisor: Vassiliki Bouki</p>
        </div>
    </footer>

    <script src="./js/app.js"></script>
    <script src="./js/register.js"></script>
</body>
</html>
