<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlie's Pizzeria - Taste the Tradition</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .landing-page {
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('images/pizzabackgroundhome.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .hero {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 0;
        }
        
        .hero h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.5);
            margin-bottom: 1rem;
        }
        
        .tagline {
            font-size: 1.5rem;
            color: #FFD166;
            margin-bottom: 2rem;
        }
        
        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .login-prompt {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem 2rem;
            border-radius: 60px;
            display: inline-block;
        }
        
        .login-prompt p {
            color: white;
            margin-bottom: 0.5rem;
        }
        
        .login-link {
            color: #FFD166;
            text-decoration: none;
            font-weight: bold;
        }
        
        footer {
            background: #2D3436;
            color: white;
            text-align: center;
            padding: 2rem 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🍕 Charlie's Pizzeria</h1>
            </div>
            <div class="nav-links">
                <a href="index.html" class="active">Home</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a>
                <a href="orders.html" id="myOrdersLink" style="display: none;">My Orders</a>
                <a href="tracking.html">Track Order</a>
                <a href="admin.html" id="adminLink" style="display: none; color: #E63946; font-weight: bold;">
                    <i class="fas fa-crown"></i> Admin Panel
                </a>
                <a href="login.html" id="loginLink">Login</a>
                <a href="register.html" id="registerLink">Register</a>
                <a href="#" id="logoutBtn" style="color: #FF4757; display: none;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
                <span id="pointsDisplay" style="display: none; background: linear-gradient(135deg, #FFD166, #FFA726); padding: 0.3rem 0.8rem; border-radius: 20px; color: white; font-weight: bold; margin-left: 10px;">
                    <i class="fas fa-star"></i> <span id="pointsValue">0</span> pts
                </span>
            </div>
        </div>
    </nav>

    <div class="landing-page">
        <section class="hero">
            <div class="container">
                <h1>Charlie's Pizzeria</h1>
                <p class="tagline">Taste the Tradition</p>
                <div class="cta-buttons">
                    <a href="menu.html" class="btn-primary">
                        Browse Menu <i class="fas fa-arrow-right"></i>
                    </a>
                    <a href="tracking.html" class="btn-secondary">
                        Track Order <i class="fas fa-location-arrow"></i>
                    </a>
                </div>
                <div class="login-prompt">
                    <p>Already have an account?</p>
                    <a href="login.html" class="login-link">Login Here!</a>
                </div>
            </div>
        </section>
        <footer>
            <div class="container">
                <p>&copy; 2026 Charlie's Pizzeria | Final Year Project</p>
                <p style="font-size: 0.8rem; margin-top: 0.5rem;">Supervisor: Vassiliki Bouki</p>
            </div>
        </footer>
    </div>
    
    <script src="./js/app.js"></script>
</body>
</html>
