<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Charlie's Pizzeria</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
        }
        
        /* Navbar */
        .navbar {
            background: white;
            padding: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-bottom: 3px solid #E63946;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .logo h1 {
            color: #E63946;
            font-size: 1.5rem;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #333;
            margin-left: 1rem;
            padding: 0.5rem;
        }
        
        .nav-links a:hover {
            color: #E63946;
        }
        
        .cart-icon {
            position: relative;
        }
        
        #cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #E63946;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Main Content with Background Image */
        .orders-page {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('images/pizzabackgroundorderhistory.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 2rem 0;
        }
        
        .orders-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        .breadcrumb {
            padding: 1rem 0;
            margin-bottom: 1rem;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }
        
        .breadcrumb a {
            color: #FFD166;
            text-decoration: none;
        }
        
        .breadcrumb span {
            color: white;
        }
        
        .orders-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .orders-card h1 {
            color: #E63946;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #E63946;
            display: inline-block;
            padding-bottom: 0.5rem;
        }
        
        .order-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 4px solid #E63946;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .order-info h3 {
            margin: 0 0 5px 0;
        }
        
        .order-info p {
            margin: 0;
            color: #666;
            font-size: 0.85rem;
        }
        
        .order-status {
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }
        
        .order-status.status-1 { background: #6c5ce7; }
        .order-status.status-2 { background: #fdcb6e; }
        .order-status.status-3 { background: #e17055; }
        .order-status.status-4 { background: #00b894; }
        .order-status.status-5 { background: #0984e3; }
        
        .order-total {
            font-weight: bold;
            color: #E63946;
            font-size: 1.1rem;
        }
        
        .view-btn {
            background: #E63946;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .view-btn:hover {
            background: #C1121F;
        }
        
        .no-orders {
            text-align: center;
            padding: 2rem;
            color: #666;
        }
        
        footer {
            background: #2D3436;
            color: white;
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        .btn-primary {
            background: #E63946;
            color: white;
            padding: 0.5rem 1rem;
            text-decoration: none;
            border-radius: 8px;
            display: inline-block;
        }
        
        .points-display {
            background: linear-gradient(135deg, #FFD166, #FFA726);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-left: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🍕 Charlie's Pizzeria</h1>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a>
                <a href="orders.html" id="myOrdersLink" style="display: none;">My Orders</a>
                <a href="tracking.html">Track Order</a>
                <a href="admin.html" id="adminLink" style="display: none; color: #E63946; font-weight: bold;">
                    <i class="fas fa-crown"></i> Admin Panel
                </a>
                <a href="login.html" id="loginLink">Login</a>
                <a href="register.html" id="registerLink">Register</a>
                <a href="#" id="logoutBtn" style="color: #FF4757; display: none;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
                <span id="pointsDisplay" class="points-display">
                    <i class="fas fa-star"></i> <span id="pointsValue">0</span> pts
                </span>
            </div>
        </div>
    </nav>

    <main class="orders-page">
        <div class="orders-container">
            <div class="breadcrumb">
                <a href="index.html">Home</a> &gt;
                <span>My Orders</span>
            </div>
            
            <div class="orders-card">
                <h1><i class="fas fa-history"></i> My Orders</h1>
                <div id="ordersList">
                    <div style="text-align: center; padding: 2rem;">
                        <i class="fas fa-spinner fa-spin fa-2x" style="color: #E63946;"></i>
                        <p style="margin-top: 1rem;">Loading your orders...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Charlie's Pizzeria | Final Year Project</p>
            <p>Supervisor: Vassiliki Bouki</p>
        </div>
    </footer>

    <script src="./js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ordersList = document.getElementById('ordersList');
            
            function getStatusText(statusCode) {
                const statuses = { 1: 'Ordered', 2: 'Preparing', 3: 'Baking', 4: 'Out for Delivery', 5: 'Delivered' };
                return statuses[statusCode] || 'Unknown';
            }
            
            const currentUser = getCurrentUser();
            
            if (!currentUser) {
                ordersList.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-lock fa-3x" style="color: #ccc; margin-bottom: 1rem;"></i>
                        <h3>Please Login to View Your Orders</h3>
                        <a href="login.html" class="btn-primary" style="margin-top: 1rem;">Login Now</a>
                    </div>
                `;
                return;
            }
            
            const userOrders = getUserOrders();
            
            if (!userOrders || userOrders.length === 0) {
                ordersList.innerHTML = `
                    <div class="no-orders">
                        <i class="fas fa-shopping-cart fa-3x" style="color: #ccc; margin-bottom: 1rem;"></i>
                        <h3>No Orders Yet</h3>
                        <a href="menu.html" class="btn-primary" style="margin-top: 1rem;">Browse Menu</a>
                    </div>
                `;
                return;
            }
            
            let html = '';
            for (let i = userOrders.length - 1; i >= 0; i--) {
                const order = userOrders[i];
                const orderDate = new Date(order.timestamp).toLocaleDateString();
                const orderTime = new Date(order.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                html += `
                    <div class="order-item">
                        <div class="order-info">
                            <h3>Order #${order.id}</h3>
                            <p>${orderDate} at ${orderTime}</p>
                            <p>${order.items.length} item(s)</p>
                        </div>
                        <div>
                            <span class="order-status status-${order.status}">${getStatusText(order.status)}</span>
                        </div>
                        <div class="order-total">
                            ${formatPrice(order.total)}
                        </div>
                        <button class="view-btn" onclick="window.location.href='tracking.html?order=${order.id}'">
                            <i class="fas fa-eye"></i> View Order
                        </button>
                    </div>
                `;
            }
            ordersList.innerHTML = html;
        });
    </script>
</body>
</html>
